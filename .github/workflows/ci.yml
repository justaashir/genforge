name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bunx ultracite check
      - name: Typecheck
        run: bun run typecheck
      - name: Test (coverage threshold enforced via bunfig.toml)
        run: bun test
